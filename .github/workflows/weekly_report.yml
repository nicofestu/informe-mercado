name: Informe semanal de mercado

on:
  schedule:
    # 11:00 UTC = 08:00 en Argentina (UTC-3, sin horario de verano) todos los lunes.
    - cron: '0 11 * * 1'
  workflow_dispatch: {}   # permite correrlo a mano desde la pestaña Actions, para probar

permissions:
  contents: write   # necesario para que el último paso pueda hacer git push

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar API key de FRED (opcional)
        if: ${{ secrets.FRED_API_KEY != '' }}
        run: echo "${{ secrets.FRED_API_KEY }}" > fred_api_key.txt

      - name: Bajar datos y calcular métricas
        run: python build_data.py

      - name: Armar email con los datos (gratis, sin narración)
        run: python build_email.py

      - name: Redactar informe narrado (opcional, requiere ANTHROPIC_API_KEY paga)
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Enviar por email
        if: always()   # se manda incluso si algún paso anterior falló, para avisar
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_email.py

      - name: Guardar datos actualizados en el repositorio
        run: |
          git config user.name "informe-bot"
          git config user.email "actions@github.com"
          git add data/latest.json "data/report_*.json" data/sp500_cache.csv || true
          git diff --cached --quiet || git commit -m "Actualización semanal $(date +%F)"
          git push
